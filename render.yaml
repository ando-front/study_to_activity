services:
  # Backend API Service
  - type: web
    name: s2a-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: s2a-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://s2a-frontend.vercel.app  # Replace with actual Vercel URL later
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PYTHONPATH
        value: .
    autoDeploy: true

  # Frontend service (Next.js)
  - type: web
    name: s2a-frontend
    env: node
    plan: free
    buildCommand: |
      cd frontend
      npm ci
      npm run build
    startCommand: |
      cd frontend
      npm run start
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true

databases:
  - name: s2a-db
    plan: free # Can be changed to starter for persistence beyond 90 days
