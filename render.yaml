services:
  # Backend API Service
  - type: web
    name: s2a-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: s2a-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://s2a-frontend.vercel.app  # Replace with actual Vercel URL later
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PYTHONPATH
        value: .
    autoDeploy: true

databases:
  - name: s2a-db
    plan: free # Can be changed to starter for persistence beyond 90 days
