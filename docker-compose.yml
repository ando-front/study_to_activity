services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: s2a
      POSTGRES_USER: s2a_user
      POSTGRES_PASSWORD: s2a_password_secure_123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s2a_user -d s2a"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://s2a_user:s2a_password_secure_123@db:5432/s2a
      - ENV=production
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
