name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        cd frontend && npm install

    - name: Lint backend (ruff)
      run: ruff check backend/

    - name: Run Backend Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest

    - name: Run Frontend Unit Tests
      working-directory: ./frontend
      run: npm test

    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium

    - name: Run E2E Tests
      working-directory: ./frontend
      run: npm run test:e2e
      env:
        CI: true

  # Preview deployment: triggered on pull requests after tests pass.
  # Deploys to a Vercel preview URL so reviewers can test changes before merging.
  # Gracefully skips all Vercel steps when credentials are not configured in repository secrets.
  preview-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel

      - name: Pull Vercel Environment Information
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        id: deploy
        if: env.VERCEL_TOKEN != ''
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: env.VERCEL_TOKEN != '' && steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            if (previewUrl) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **プレビューデプロイ完了！**\n\n${previewUrl}\n\nテストが通過したためプレビュー環境にデプロイされました。`,
              });
            }

